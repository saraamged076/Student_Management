<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>Student Dashboard</h2>

        <button
            class="btn btn-danger"
            onclick="logout()"
        >
            Logout
        </button>

    </div>

    <!-- Metrics -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Requests</h5>
                <h3 id="totalRequests">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Errors</h5>
                <h3 id="errors">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Response Time</h5>
                <h3 id="responseTime">0</h3>
            </div>
        </div>

    </div>

<!-- Add Student -->
<div id="addStudentSection">

    <div class="card p-4 shadow-sm mb-4">

        <h4>Add Student</h4>

        <form id="studentForm">

            <div class="row">

                <div class="col-md-4">
                    <input
                        type="text"
                        id="studentName"
                        class="form-control"
                        placeholder="Student Name"
                        required
                    >
                </div>

                <div class="col-md-4">
                    <input
                        type="text"
                        id="studentDepartment"
                        class="form-control"
                        placeholder="Department"
                        required
                    >
                </div>

                <div class="col-md-4">
                    <input
                        type="number"
                        step="0.1"
                        id="studentGpa"
                        class="form-control"
                        placeholder="GPA"
                        required
                    >
                </div>

            </div>

            <button
                type="submit"
                class="btn btn-primary mt-3"
            >
                Add Student
            </button>

        </form>

    </div>

</div>

    <!-- Students Table -->
    <div class="card p-4 shadow-sm">

        <h4>Students</h4>

        <table class="table table-striped mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>GPA</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="studentsTable">

            </tbody>

        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
