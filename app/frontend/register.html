<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="auth-card">

        <h2 class="text-center mb-4">
            Register
        </h2>

        <form id="registerForm">

            <div class="mb-3">
                <label>Username</label>

                <input
                    type="text"
                    id="regUsername"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Email</label>

                <input
                    type="email"
                    id="regEmail"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Password</label>

                <input
                    type="password"
                    id="regPassword"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Role</label>

                <select
                    id="regRole"
                    class="form-control"
                >
                    <option value="student">
                        Student
                    </option>

                    <option value="admin">
                        Admin
                    </option>
                </select>
            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >
                Register
            </button>

        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <div id="registerMessage" class="mt-3 text-center"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
